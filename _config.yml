title : Практикум по компьютерным технологиям
author: Shishkin Artem
logo: 'docs/icons/logo.png'

# Short description about the book
description: >-
  Курс лекций по дисциплине "Практикум по компьютерным технологиям".

execute:
  execute_notebooks: 'off'
  allow_errors     : true
  
exclude_patterns: [venv/*]
# HTML-specific settings
html:
  favicon                     : "docs/icons/favicon.png" 
  home_page_in_navbar         : true
  use_repository_button       : true
  use_issues_button           : true
  use_edit_page_button        : true

# Interact link settings
notebook_interface            : "notebook"



sphinx:
  extra_extensions: ['IPython.sphinxext.ipython_console_highlighting']
  config:
    mathjax_path: 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js'
    html_js_files: 'https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.4/require.min.js'
    
# Launch button settings
repository:
  url: https://github.com/Fetappi/CPP_lectures
  branch: main 
launch_buttons:
  colab_url: "https://colab.research.google.com"



